services:
  python:
    restart: unless-stopped
    image: ghcr.io/pikaseya-ops/gestion-stock-mobile:${DOCKER_TAG:-main}
    container_name: gestion-stock-mobile
    hostname: gestion-stock-mobile
    environment:
      TZ: Europe/Paris
      SESSION_TOKEN: ${SESSION_TOKEN}
      DEBUG_MODE: ${DEBUG_MODE}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-${SMTP_USER}}
    expose:
      - 5000
    volumes:
      - bdd:/app/instances/

volumes:
  bdd: